<script>
    const canvas = document.getElementById('air'), ctx = canvas.getContext('2d');
    const ROOM_KEY = "z-mega-match-v30"; // Единый ключ для всех
    let peer = new Peer(), conn, isHost = true, running = false, isBotMode = false;
    
    let myElo = parseInt(localStorage.getItem('zewir_elo')) || 1000;
    const ranks = [
        { name: "DIAMOND", min: 1800, color: "#b9f2ff" },
        { name: "PLATINUM", min: 1500, color: "#e5e4e2" },
        { name: "GOLD", min: 1300, color: "#ffd700" },
        { name: "SILVER", min: 1100, color: "#c0c0c0" },
        { name: "BRONZE", min: 0, color: "#cd7f32" }
    ];

    function updateRank() {
        document.getElementById('elo-display').innerText = myElo;
        const rank = ranks.find(r => myElo >= r.min);
        const tag = document.getElementById('rank-display');
        tag.innerText = rank.name; tag.style.color = rank.color;
    }
    updateRank();

    const puck = { x: 400, y: 250, vx: 0, vy: 0, r: 15 };
    const p1 = { x: 80, y: 250, r: 35, s: 0, lastX: 80, lastY: 250, cvx: 0, cvy: 0 }; 
    const p2 = { x: 720, y: 250, r: 35, s: 0, lastX: 720, lastY: 250, cvx: 0, cvy: 0, vx: 0, vy: 0 };

    // --- УЛЬТРА-ПОИСК ---
    function startSearch() {
        document.getElementById('search-btn').innerText = "ПОИСК ИГРОКА...";
        document.getElementById('status').innerText = "Проверка очереди...";
        
        // Пытаемся подключиться к глобальной комнате
        let c = peer.connect(ROOM_KEY);
        
        let timeout = setTimeout(() => { 
            c.close(); 
            createGlobalLobby(); // Если никого нет, создаем лобби сами
        }, 1500);

        c.on('open', () => { 
            clearTimeout(timeout); 
            conn = c; 
            isHost = false; 
            document.getElementById('status').innerText = "ИГРОК НАЙДЕН!";
            init(); 
        });
    }

    function createGlobalLobby() {
        peer.destroy(); 
        peer = new Peer(ROOM_KEY); // Занимаем место хоста
        peer.on('open', () => {
            document.getElementById('status').innerText = "В ОЧЕРЕДИ (ЖДЕМ...)";
            document.getElementById('bot-btn').style.display = "block";
            peer.on('connection', (c) => { 
                conn = c; 
                isHost = true; 
                document.getElementById('status').innerText = "КТО-ТО ЗАШЕЛ!";
                init(); 
            });
        });
        peer.on('error', (err) => {
            if(err.type === 'unavailable-id') {
                // Если пока мы создавали, кто-то уже занял — пробуем еще раз зайти
                startSearch();
            }
        });
    }

    function startBotGame() { isBotMode = true; isHost = true; init(); }

    function init() {
        document.getElementById('lobby').classList.add('hidden');
        running = true; if(isHost) resetPuck();
        if(!isBotMode && conn) {
            conn.on('data', (d) => {
                if(isHost) { p2.x = d.px; p2.y = d.py; p2.cvx = d.vx; p2.cvy = d.vy; } 
                else { puck.x = d.bx; puck.y = d.by; p1.x = d.p1x; p1.y = d.p1y; p1.s = d.s1; p2.s = d.s2; }
            });
        }
        loop();
    }

    function resetPuck() {
        puck.x = 400; puck.y = 250;
        puck.vx = (Math.random() > 0.5 ? 9 : -9);
        puck.vy = (Math.random() - 0.5) * 12;
    }

    canvas.addEventListener('mousemove', (e) => {
        if(!running) return;
        const r = canvas.getBoundingClientRect();
        if(isHost) { p1.x = Math.min(e.clientX - r.left, 380); p1.y = e.clientY - r.top; }
        else { p2.x = Math.max(e.clientX - r.left, 420); p2.y = e.clientY - r.top; }
    });

    function loop() {
        if(!running) return;

        if(isHost) {
            p1.cvx = p1.x - p1.lastX; p1.cvy = p1.y - p1.lastY;
            p1.lastX = p1.x; p1.lastY = p1.y;

            puck.x += puck.vx; puck.y += puck.vy;
            if(puck.y < 15 || puck.y > 485) puck.vy *= -1;

            if(isBotMode) {
                let targetX = (puck.x > 400) ? puck.x + 45 : 720;
                let targetY = (puck.x > 380) ? puck.y : 250;
                targetX = Math.max(450, Math.min(750, targetX));
                let dx = targetX - p2.x, dy = targetY - p2.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                let speed = Math.min(dist * 0.1, 8);
                if (dist > 1) { p2.vx = (dx/dist)*speed; p2.vy = (dy/dist)*speed; }
                p2.x += p2.vx; p2.y += p2.vy;
                p2.cvx = p2.vx; p2.cvy = p2.vy;
            }

            [p1, p2].forEach(p => {
                let dx = puck.x - p.x, dy = puck.y - p.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < puck.r + p.r) {
                    let angle = Math.atan2(dy, dx);
                    let power = Math.sqrt(p.cvx**2 + p.cvy**2);
                    let s = Math.max(10, 9 + power * 0.5); 
                    puck.vx = Math.cos(angle) * Math.min(s, 22);
                    puck.vy = Math.sin(angle) * Math.min(s, 22);
                    puck.x = p.x + Math.cos(angle) * (puck.r + p.r + 2);
                }
            });

            if (Math.sqrt(puck.vx**2 + puck.vy**2) < 7.5) { puck.vx *= 1.03; puck.vy *= 1.03; }

            if(puck.x < 0) { p2.s++; resetPuck(); check(); }
            if(puck.x > 800) { p1.s++; resetPuck(); check(); }
            if(!isBotMode && conn) conn.send({ bx: puck.x, by: puck.y, p1x: p1.x, p1y: p1.y, s1: p1.s, s2: p2.s });
        } else if(conn) {
            let vx = p2.x - p2.lastX, vy = p2.y - p2.lastY;
            p2.lastX = p2.x; p2.lastY = p2.y;
            conn.send({ px: p2.x, py: p2.y, vx: vx, vy: vy });
        }
        
        document.getElementById('score').innerText = `${p1.s} : ${p2.s}`;
        draw();
        requestAnimationFrame(loop);
    }

    function check() {
        if(p1.s >= 5 || p2.s >= 5) {
            running = false;
            let win = p1.s >= 5;
            let change = win ? 25 : -15;
            myElo = Math.max(0, myElo + change);
            localStorage.setItem('zewir_elo', myElo);
            updateRank();
            document.getElementById('lobby').classList.remove('hidden');
            document.getElementById('win-msg').innerText = win ? "ПОБЕДА!" : "ПРОИГРЫШ";
            document.getElementById('elo-change').innerText = win ? `+${change} RP` : `${change} RP`;
            document.getElementById('elo-change').style.color = win ? "#238636" : "#f9826c";
            document.getElementById('re-btn').classList.remove('hidden');
        }
    }

    function draw() {
        ctx.clearRect(0,0,800,500);
        ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.strokeRect(400,0,1,500);
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r, 0, 7); ctx.fill();
        ctx.fillStyle = "#f9826c"; ctx.beginPath(); ctx.arc(p1.x, p1.y, p1.r, 0, 7); ctx.fill();
        ctx.fillStyle = "#58a6ff"; ctx.beginPath(); ctx.arc(p2.x, p2.y, p2.r, 0, 7); ctx.fill();
    }
</script>
